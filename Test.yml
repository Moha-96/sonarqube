parameters:
  - name: ProjectsFilter
    type: string
  - name: Configuration
    type: string
  - name: Arguments
    type: string
    default: ""
  - name: DisplayPrefix
    type: string
    default: ""
  - name: DevOpsServiceConnection
    type: string
    default: ""
  - name: CoverageOutputFile
    type: string
    default: "coverage.xml"
  # Docker service connection to the ACR hosting the shared images
  # (crbofacrboflexshared.azurecr.io). Leave empty to skip the login step.
  - name: ContainerRegistryServiceConnection
    type: string
    default: ""

steps:
  # start test infrastructure for integration tests (e.g. ReqnRoll)
  # NOTE: requires a Linux agent with Docker (the compose file uses Linux containers)

  - script: docker version
    displayName: 'Verify Docker'

  - ${{ if ne(parameters.ContainerRegistryServiceConnection, '') }}:
      - task: Docker@2
        displayName: 'Login to container registry'
        inputs:
          command: login
          containerRegistry: ${{ parameters.ContainerRegistryServiceConnection }}

  - script: docker compose -f src/docker-compose.yml up -d
    displayName: 'Start test environment (Docker Compose)'
    env:
      AZURE_DEVOPS_PAT: $(AZURE_DEVOPS_PAT)
      SERVICEBUS_CONNECTIONSTRING: $(SERVICEBUS_CONNECTIONSTRING)

  - script: |
      echo "Waiting for SQL Server to be ready..."
      for i in $(seq 1 30); do
        if docker exec boflex-core-mssql-local /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_password123" -C -Q "SELECT 1" > /dev/null 2>&1 \
        || docker exec boflex-core-mssql-local /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Your_password123" -Q "SELECT 1" > /dev/null 2>&1; then
          echo "SQL Server is ready."
          exit 0
        fi
        echo "Attempt $i/30: not ready yet, retrying in 5s..."
        sleep 5
      done
      echo "SQL Server did not become ready in time."
      exit 1
    displayName: 'Wait for containers to be ready'

  - script: docker ps
    displayName: 'Debug running containers'

  - task: DotNetCoreCLI@2
    displayName: '${{ parameters.DisplayPrefix }}Test with Coverage ${{ parameters.ProjectsFilter }}'
    inputs:
      command: test
      projects: ${{ parameters.ProjectsFilter }}
      arguments: >
        --configuration ${{ parameters.Configuration }}
        --collect:"XPlat Code Coverage"
        --logger trx
        --results-directory $(Agent.TempDirectory)
        ${{ parameters.Arguments }}

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '*.trx'
      searchFolder: '$(Agent.TempDirectory)'

  # stop test infrastructure

  - script: docker compose -f src/docker-compose.yml logs --tail=100
    displayName: 'Show container logs'
    condition: failed()

  - script: docker compose -f src/docker-compose.yml down
    displayName: 'Stop test environment (Docker Compose)'
    condition: always()
